name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install age + sops
        # The age-keygen, sops, and secret tests skip when these binaries
        # aren't on PATH. Install them so CI actually runs the gated
        # tests instead of silently skipping them.
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          SOPS_VERSION="3.9.4"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
          age-keygen --version || age --version
          sops --version

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src tests

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Build
        run: npm run build
