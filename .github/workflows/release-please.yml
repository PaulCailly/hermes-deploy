name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # id-token is required for:
  #   (a) npm trusted publishing via OIDC (the publish job below)
  #   (b) npm provenance, which is automatic when publishing via
  #       trusted publishing from a public repo + public package
  id-token: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # The npm-publish environment still gates this job — it adds an
    # approval step (if required-reviewers is enabled) and restricts
    # which branches can publish. No NPM_TOKEN secret is needed
    # anymore: authentication happens via OIDC against the trusted
    # publisher configured on npmjs.com. See docs/releasing.md for
    # the one-time setup that makes this job work.
    environment: npm-publish
    # id-token: write is inherited from the top-level permissions
    # block above so that the npm CLI can mint an OIDC token and
    # exchange it for a short-lived publish credential.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 24 ships with npm 11.x which supports trusted publishing
          # via OIDC out of the box — no manual npm upgrade needed.
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install age + sops
        # Required by the test suite (secrets/sops tests skip otherwise).
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq age
          SOPS_VERSION="3.9.4"
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops

      - name: Install npm dependencies
        run: npm ci

      - name: Lint + typecheck + test + build
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Publish to npm via trusted publishing
        # No NODE_AUTH_TOKEN / NPM_TOKEN: the npm CLI detects the
        # GitHub Actions OIDC environment and uses it automatically.
        # No --provenance flag: trusted publishing from a public repo
        # to a public package generates provenance attestations by
        # default. No --access public: publishConfig.access in
        # package.json already declares it.
        run: npm publish
